# Performance budgets — product requirements, not aspirations.
# Source of truth: docs/architecture/platform-and-performance.md
#
# Each budget is asserted in CI by crates/copilot-core/tests/perf_budgets.rs
# (release mode). `status = "enforced"` budgets fail the build on regression;
# `status = "pending"` budgets are declared here ahead of their feature and
# MUST flip to enforced in the task that ships the feature (tracked in
# openspec/changes/add-v1-foundation). A budget id with no registered
# benchmark but status = "enforced" fails CI — the table cannot silently
# drift from the suite.

[reference_machine]
description = "4-core laptop, 8 GB RAM, integrated GPU"
# CI runners are not the reference machine; measured times are compared to
# budget_ms * slack_factor (override with PERF_CI_SLACK env var).
ci_slack_factor = 3.0

